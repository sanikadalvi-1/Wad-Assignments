<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registered Users</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --card: #161616; --accent: #ffffff;
      --text: #f0f0f0; --muted: #666; --border: #2a2a2a;
      --row-hover: #1c1c1c; --danger: #ff5c5c;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; padding: 2rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 30% 80%, rgba(200,241,53,0.05) 0%, transparent 70%);
      pointer-events: none;
    }
    .top-bar {
      max-width: 860px; margin: 0 auto 2.5rem;
      display: flex; align-items: flex-end;
      justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; }
    .brand-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; }
    .brand span {
      font-family: 'Syne', sans-serif; font-size: 1rem;
      font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; }
    h1 span { color: var(--accent); }
    .back-link {
      text-decoration: none; color: var(--muted); font-size: 0.88rem;
      border: 1.5px solid var(--border); padding: 0.55rem 1.1rem;
      border-radius: 8px; transition: color 0.2s, border-color 0.2s; white-space: nowrap;
    }
    .back-link:hover { color: var(--accent); border-color: var(--accent); }
    .main { max-width: 860px; margin: 0 auto; animation: fadeUp 0.6s 0.1s ease both; opacity: 0; animation-fill-mode: forwards; }
    .stats-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.4rem; flex: 1; }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.3rem; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .search-box { margin-bottom: 1.2rem; }
    .search-box input {
      width: 100%; background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 0.7rem 1rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.92rem;
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--muted); }
    .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 0.9rem 1.2rem; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 500; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }
    tbody td { padding: 0.9rem 1.2rem; font-size: 0.92rem; }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: #0d0d0d;
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.85rem;
      display: inline-flex; align-items: center; justify-content: center;
      margin-right: 0.6rem; vertical-align: middle; flex-shrink: 0;
    }
    .name-cell { display: flex; align-items: center; }
    .del-btn {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); padding: 0.35rem 0.8rem;
      border-radius: 7px; font-size: 0.8rem; cursor: pointer;
      transition: border-color 0.2s, color 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .del-btn:hover { border-color: var(--danger); color: var(--danger); }
    .empty-state { padding: 3rem 1.5rem; text-align: center; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .empty-state p { font-size: 0.9rem; }
    .empty-state a { color: var(--accent); text-decoration: none; }
    .badge {
      display: inline-block; background: rgba(200,241,53,0.12);
      color: var(--accent); font-size: 0.72rem;
      padding: 0.2rem 0.55rem; border-radius: 20px;
      font-weight: 500; letter-spacing: 0.04em;
    }
    @media (max-width: 600px) {
      .stats-row { flex-direction: column; }
      thead th:nth-child(3), tbody td:nth-child(3) { display: none; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
 
<div class="top-bar">
  <div>
    <div class="brand"><div class="brand-dot"></div><span>RegApp</span></div>
    <h1>All <span>Users</span></h1>
  </div>
  <a href="index.html" class="back-link">← Register New</a>
</div>
 
<div class="main">
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Total Registered</div>
      <div class="stat-value" id="totalCount">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Last Registered</div>
      <div class="stat-value" id="lastUser" style="font-size:1rem; padding-top:4px; color: var(--text)">—</div>
    </div>
  </div>
 
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search by name or email…">
  </div>
 
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>User</th>
          <th>Email</th>
          <th>Registered At</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="userList"></tbody>
    </table>
  </div>
</div>
 
<script>
  const KEY = 'regapp_users';
 
  function getUsers() { return JSON.parse(localStorage.getItem(KEY)) || []; }
  function saveUsers(u) { localStorage.setItem(KEY, JSON.stringify(u)); }
  function initials(name) { return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
 
  function renderTable(filter = '') {
    const users = getUsers();
    const tbody = document.getElementById('userList');
 
    document.getElementById('totalCount').textContent = users.length;
    document.getElementById('lastUser').textContent = users.length ? users[users.length - 1].name : '—';
 
    const filtered = users.filter(u =>
      u.name.toLowerCase().includes(filter) || u.email.toLowerCase().includes(filter)
    );
 
    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
        <div class="icon">📋</div>
        <p>${filter ? 'No users match your search.' : 'No users yet. <a href="index.html">Register one →</a>'}</p>
      </div></td></tr>`;
      return;
    }
 
    tbody.innerHTML = filtered.map(user => {
      const realIndex = users.findIndex(u => u.id === user.id);
      return `
        <tr>
          <td><div class="name-cell"><div class="avatar">${initials(user.name)}</div>${user.name}</div></td>
          <td>${user.email}</td>
          <td><span class="badge">${user.createdAt || 'N/A'}</span></td>
          <td><button class="del-btn" onclick="deleteUser(${realIndex})">Delete</button></td>
        </tr>`;
    }).join('');
  }
 
  function deleteUser(index) {
    if (!confirm('Remove this user?')) return;
    const users = getUsers();
    users.splice(index, 1);
    saveUsers(users);
    renderTable(document.getElementById('searchInput').value.toLowerCase().trim());
  }
 
  document.getElementById('searchInput').addEventListener('input', function() {
    renderTable(this.value.toLowerCase().trim());
  });
 
  renderTable();
</script>
</body>
</html>
